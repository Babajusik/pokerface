<!doctype html>
<!-- PokerFace Home v2 — направление «ночное шоу», лайм-акцент + retention-хуки. -->
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PokerFace · Home v2</title>
  <style>
    :root {
      --bg:#08080a; --surface:#141418; --surface2:#1c1c22; --border:#2a2a33;
      --fg:#f4f4f6; --muted:#8a8a96; --accent:#c8f250; --accent-press:#a6cf3a;
      --hot:#ff5d73; --gold:#f5c518;
      --font-display:'SF Pro Display',-apple-system,'Segoe UI',system-ui,sans-serif;
      --font-body:-apple-system,'SF Pro Text',system-ui,sans-serif;
      --font-mono:ui-monospace,'SF Mono',Menlo,monospace;
    }
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%}
    body{background:radial-gradient(70% 50% at 50% -5%, rgba(200,242,80,0.10), var(--bg) 60%);
      color:var(--fg);font-family:var(--font-body);display:grid;place-items:center;padding:32px;-webkit-font-smoothing:antialiased}
    .stage{display:flex;flex-direction:column;align-items:center;gap:22px}
    .caption{font-family:var(--font-mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
    .caption strong{color:var(--fg);font-weight:500}
    .device{position:relative;width:390px;height:844px;border-radius:56px;padding:12px;
      background:linear-gradient(160deg,#2a2a2c,#141416 55%,#0a0a0c);
      box-shadow:0 0 0 2px #000 inset,0 28px 60px -12px rgba(0,0,0,.55)}
    .island{position:absolute;top:22px;left:50%;transform:translateX(-50%);width:124px;height:36px;background:#000;border-radius:999px;z-index:5}
    .screen{position:relative;width:100%;height:100%;background:var(--bg);border-radius:44px;overflow:hidden;display:flex;flex-direction:column}
    .statusbar{flex:0 0 47px;padding:18px 26px 0;display:flex;align-items:flex-start;justify-content:space-between;font-size:15px;font-weight:600;color:var(--fg)}
    .statusbar .right{display:inline-flex;align-items:center;gap:6px}
    .statusbar svg{width:17px;height:11px;fill:var(--fg)} .battery{width:25px}
    .content{flex:1 1 auto;overflow:hidden;display:flex;flex-direction:column;padding:6px 22px 22px}
    .home-indicator{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);width:134px;height:5px;background:var(--fg);border-radius:999px;opacity:.85}
    .num{font-family:var(--font-mono);font-variant-numeric:tabular-nums}

    /* top stat row (retention: streak + matches + online) */
    .stats{display:flex;gap:8px;align-items:center;margin-top:4px}
    .chip{display:inline-flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--fg)}
    .chip .hot{color:var(--hot)} .chip .muted{color:var(--muted);font-weight:500}
    .online{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
    .dot{width:8px;height:8px;border-radius:999px;background:var(--accent);box-shadow:0 0 8px var(--accent)}

    /* hero */
    .hero{flex:1 1 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
    .logo{font-size:88px;line-height:1;filter:drop-shadow(0 10px 30px rgba(200,242,80,.25))}
    .brand{font-family:var(--font-display);font-size:54px;font-weight:800;letter-spacing:-.03em;margin:6px 0 0;transform:rotate(-2deg)}
    .brand b{color:var(--accent)}
    .tagline{color:var(--muted);font-size:15px;margin:10px 0 0}

    /* actions */
    .actions{display:flex;flex-direction:column;gap:10px;padding-bottom:6px}
    .name{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;color:var(--fg);font-size:16px}
    .name::placeholder{color:var(--muted)}
    .quick{display:flex;align-items:center;justify-content:center;gap:8px;min-height:60px;background:var(--accent);color:#10210a;border:0;border-radius:18px;font-size:19px;font-weight:800;box-shadow:0 12px 30px -8px rgba(200,242,80,.5);cursor:pointer}
    .pair{display:flex;gap:10px}
    .btn2{flex:1;min-height:50px;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:14px;color:var(--fg);font-size:15px;font-weight:700}
    .invite{display:flex;align-items:center;justify-content:center;gap:8px;background:transparent;border:1px dashed var(--border);border-radius:14px;min-height:46px;color:var(--accent);font-size:14px;font-weight:700}
    .ghost{text-align:center;color:var(--muted);font-size:14px;font-weight:600;padding:6px}
  </style>
</head>
<body>
  <div class="stage">
    <div class="caption"><strong>PokerFace</strong> · Home v2 — направление «ночное шоу»</div>
    <div class="device">
      <span class="island"></span>
      <div class="screen">
        <div class="statusbar">
          <span class="num">9:41</span>
          <span class="right">
            <svg viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx=".6"/><rect x="4" y="5" width="3" height="6" rx=".6"/><rect x="8" y="3" width="3" height="8" rx=".6"/><rect x="12" y="0" width="3" height="11" rx=".6"/></svg>
            <svg viewBox="0 0 17 11"><path d="M8.5 1.5C5.5 1.5 2.7 2.6.5 4.6L2 6.1C3.8 4.5 6.1 3.6 8.5 3.6c2.4 0 4.7.9 6.5 2.5l1.5-1.5c-2.2-2-5-3.1-8-3.1z"/></svg>
            <svg class="battery" viewBox="0 0 25 11"><rect x=".5" y=".5" width="21" height="10" rx="2.5" fill="none" stroke="currentColor" stroke-opacity=".45"/><rect x="22" y="3.5" width="1.5" height="4" rx=".4"/><rect x="2" y="2" width="18" height="7" rx="1.4"/></svg>
          </span>
        </div>

        <div class="content">
          <!-- retention: привычка + прогресс + соц-доказательство -->
          <div class="stats">
            <span class="chip"><span class="hot">🔥</span> 3 <span class="muted">дня</span></span>
            <span class="chip">🎭 <span class="num">12</span> <span class="muted">матчей</span></span>
            <span class="online"><span class="dot"></span> 47 онлайн</span>
          </div>

          <div class="hero">
            <div class="logo">🎭</div>
            <h1 class="brand">Poker<b>Face</b></h1>
            <p class="tagline">Не улыбайся. Останься последним.</p>
          </div>

          <div class="actions">
            <input class="name" placeholder="Твоё имя — Васёк" />
            <button class="quick">⚡ Быстрая игра</button>
            <div class="pair">
              <div class="btn2">➕ Создать</div>
              <div class="btn2">🔍 Найти</div>
            </div>
            <div class="invite">🎟️ Позови друзей — вместе веселее</div>
            <div class="ghost">⚙ Настройки</div>
          </div>
        </div>
        <div class="home-indicator"></div>
      </div>
    </div>
  </div>
</body>
</html>
