<!doctype html>
<!-- PokerFace Game v2 — лайм «ночное шоу». Камеры+карточки, измеритель улыбки, ведущий, арсенал. -->
<html lang="ru">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PokerFace · Game v2</title>
  <style>
    :root{--bg:#08080a;--surface:#141418;--surface2:#1c1c22;--border:#2a2a33;--fg:#f4f4f6;--muted:#8a8a96;--accent:#c8f250;--yellow:#f5c518;--red:#ff5d73;--green:#7ee08a;--font-display:'SF Pro Display',-apple-system,system-ui,sans-serif;--font-body:-apple-system,system-ui,sans-serif;--font-mono:ui-monospace,Menlo,monospace}
    *,*::before,*::after{box-sizing:border-box}html,body{margin:0;height:100%}
    body{background:radial-gradient(70% 40% at 50% -5%,rgba(200,242,80,.06),var(--bg) 60%);color:var(--fg);font-family:var(--font-body);display:grid;place-items:center;padding:32px}
    .caption{font-family:var(--font-mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:22px;text-align:center}
    .caption strong{color:var(--fg)}
    .device{position:relative;width:390px;height:844px;border-radius:56px;padding:12px;background:linear-gradient(160deg,#2a2a2c,#141416 55%,#0a0a0c);box-shadow:0 0 0 2px #000 inset,0 28px 60px -12px rgba(0,0,0,.55)}
    .island{position:absolute;top:22px;left:50%;transform:translateX(-50%);width:124px;height:36px;background:#000;border-radius:999px;z-index:5}
    .screen{position:relative;width:100%;height:100%;background:var(--bg);border-radius:44px;overflow:hidden;display:flex;flex-direction:column}
    .statusbar{flex:0 0 47px;padding:18px 26px 0;display:flex;justify-content:space-between;font-size:15px;font-weight:600}
    .num{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
    .content{flex:1 1 auto;overflow:hidden;display:flex;flex-direction:column;padding:4px 16px 14px}
    .home-indicator{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);width:134px;height:5px;background:var(--fg);border-radius:999px;opacity:.85}

    .hd{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
    .title{font-family:var(--font-display);font-size:26px;font-weight:900;letter-spacing:-.02em}
    .title b{color:var(--accent)} .leave{color:var(--muted);font-size:13px}

    .host{display:flex;gap:10px;align-items:center;margin-top:10px;background:linear-gradient(90deg,rgba(200,242,80,.16),rgba(200,242,80,.04));border:1px solid rgba(200,242,80,.4);border-radius:14px;padding:10px 12px}
    .host .ava{font-size:20px} .host .tx{font-size:13px;font-weight:600;line-height:1.3}

    .cams{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
    .cam{aspect-ratio:1/1;border-radius:14px;background:linear-gradient(135deg,#202028,#15151a);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:34px;position:relative;overflow:hidden}
    .cam.y{border-color:var(--yellow)} .cam.r{border-color:var(--red);opacity:.55}
    .cam b{position:absolute;left:8px;bottom:8px;font-size:11px;background:rgba(0,0,0,.55);padding:2px 8px;border-radius:8px;font-weight:600}
    .cam .card{position:absolute;top:8px;right:8px;font-size:16px}
    .meter{position:absolute;left:8px;right:8px;bottom:30px;height:8px;background:rgba(0,0,0,.5);border-radius:999px;overflow:hidden}
    .meter>span{display:block;height:100%;width:32%;background:var(--green)}
    .pct{position:absolute;right:8px;top:8px;font-size:11px;font-weight:700;background:rgba(0,0,0,.5);padding:2px 6px;border-radius:6px}

    .arsenal{margin-top:auto;padding-top:12px}
    .alabel{color:var(--muted);font-size:11px;margin:0 2px 6px}
    .targets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .t{padding:7px 12px;border-radius:999px;background:var(--surface);border:1px solid var(--border);font-size:13px;font-weight:600;color:var(--muted)}
    .t.on{border-color:var(--accent);color:var(--accent);background:rgba(200,242,80,.12)}
    .items{display:flex;gap:8px}
    .it{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px 6px}
    .it .e{font-size:22px} .it .l{font-size:11px;font-weight:600} .it .c{font-size:12px;font-weight:800;color:var(--accent)}
  </style>
</head>
<body>
  <div>
    <div class="caption"><strong>PokerFace</strong> · Game v2</div>
    <div class="device"><span class="island"></span><div class="screen">
      <div class="statusbar"><span class="num">9:41</span><span class="num">100%</span></div>
      <div class="content">
        <div class="hd"><div class="title">Не <b>улыбайся!</b></div><div class="leave">Выйти</div></div>

        <div class="host"><span class="ava">🤖</span><span class="tx">Марс, дыши ровно. Скоро это закончится. Как и всё хорошее.</span></div>

        <div class="cams">
          <div class="cam">🙂<b>Ты</b><span class="pct">32%</span><div class="meter"><span></span></div></div>
          <div class="cam y">😬<b>Марс</b><span class="card">🟨</span></div>
          <div class="cam">😎<b>Коля</b></div>
          <div class="cam r">💀<b>Дима</b><span class="card">🟥</span></div>
        </div>

        <div class="arsenal">
          <div class="alabel">Цель:</div>
          <div class="targets"><span class="t on">Марс</span><span class="t">Коля</span></div>
          <div class="items">
            <div class="it"><span class="e">😂</span><span class="l">Мем</span><span class="c">3</span></div>
            <div class="it"><span class="e">🔊</span><span class="l">Звук</span><span class="c">3</span></div>
            <div class="it"><span class="e">🤡</span><span class="l">Стикер</span><span class="c">2</span></div>
            <div class="it"><span class="e">💬</span><span class="l">Ведущий</span><span class="c">2</span></div>
          </div>
        </div>
      </div>
      <div class="home-indicator"></div>
    </div></div>
  </div>
</body>
</html>
