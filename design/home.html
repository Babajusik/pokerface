<!doctype html>
<!-- PokerFace — Home (welcome) макет. Сид: mobile-app skill, iPhone 15 Pro. -->
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PokerFace · Home</title>
  <style>
    :root {
      --bg:      #0b0d12;
      --surface: #171b22;
      --fg:      #f1f3f8;
      --muted:   #8b95a5;
      --border:  #2a313d;
      --accent:  #2dd4bf;

      --accent-soft: color-mix(in oklch, var(--accent) 16%, transparent);
      --fg-soft:     color-mix(in oklch, var(--fg) 6%, transparent);

      --font-display: 'Iowan Old Style', 'Charter', Georgia, serif;
      --font-body:    -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
      --font-mono:    ui-monospace, 'SF Mono', Menlo, monospace;

      --fs-h1: 26px; --fs-h2: 20px; --fs-h3: 16px; --fs-body: 15px; --fs-meta: 12px;
      --radius-card: 18px; --radius-pill: 999px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: radial-gradient(60% 80% at 50% 0%, color-mix(in oklch, var(--accent) 9%, var(--bg)) 0%, var(--bg) 60%);
      color: var(--fg); font-family: var(--font-body); font-size: var(--fs-body);
      line-height: 1.4; -webkit-font-smoothing: antialiased;
      display: grid; place-items: center; padding: 32px;
    }
    .stage { display: flex; flex-direction: column; align-items: center; gap: 24px; }
    .caption { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .caption strong { color: var(--fg); font-weight: 500; }

    .device {
      position: relative; width: 390px; height: 844px; border-radius: 56px; padding: 12px;
      background: linear-gradient(160deg, #2a2a2c 0%, #1a1a1c 50%, #0e0e10 100%);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset, 0 0 0 2px #000 inset,
        0 28px 60px -12px rgba(0,0,0,0.45), 0 8px 20px -8px rgba(0,0,0,0.35);
      isolation: isolate;
    }
    .device::before, .device::after { content:''; position:absolute; width:3px;
      background: linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.06) 8%, transparent 16%, transparent 84%, rgba(255,255,255,0.04) 92%, transparent 100%);
      top:100px; bottom:100px; pointer-events:none; }
    .device::before { left:-1px; } .device::after { right:-1px; }
    .island { position:absolute; top:22px; left:50%; transform:translateX(-50%); width:124px; height:36px; background:#000; border-radius:999px; z-index:5; }
    .btn-rail { position:absolute; width:4px; background:#0a0a0c; border-radius:2px; }
    .btn-rail.left-1{left:-3px;top:174px;height:32px} .btn-rail.left-2{left:-3px;top:220px;height:60px}
    .btn-rail.left-3{left:-3px;top:290px;height:60px} .btn-rail.right-1{right:-3px;top:250px;height:100px}

    .screen { position:relative; width:100%; height:100%; background:var(--bg); border-radius:44px; overflow:hidden; display:flex; flex-direction:column; }
    .statusbar { flex:0 0 47px; padding:18px 26px 0; display:flex; align-items:flex-start; justify-content:space-between; font-family:var(--font-body); font-size:15px; font-weight:600; color:var(--fg); letter-spacing:-0.01em; }
    .statusbar .right { display:inline-flex; align-items:center; gap:6px; }
    .statusbar svg { width:17px; height:11px; fill:var(--fg); } .statusbar .battery { width:25px; }
    .content { flex:1 1 auto; overflow-y:auto; overflow-x:hidden; padding:8px 0 28px; }
    .content::-webkit-scrollbar { display:none; }
    .home-indicator { flex:0 0 28px; position:relative; }
    .home-indicator::after { content:''; position:absolute; left:50%; bottom:8px; transform:translateX(-50%); width:134px; height:5px; background:var(--fg); border-radius:999px; opacity:0.85; }
    .num { font-family:var(--font-mono); font-variant-numeric:tabular-nums; }

    /* ── Welcome layout ── */
    .welcome { min-height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:24px 28px 8px; text-align:center; gap:0; }
    .logo { font-size:84px; line-height:1; filter: drop-shadow(0 8px 24px var(--accent-soft)); }
    .brand { font-family:var(--font-display); font-size:48px; font-weight:700; letter-spacing:-0.03em; margin:14px 0 0; }
    .tagline { color:var(--muted); font-size:15px; margin:8px 0 0; max-width:240px; }
    .field { width:100%; margin-top:40px; }
    .field label { display:block; text-align:left; font-family:var(--font-mono); font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); margin:0 0 8px 4px; }
    .input { width:100%; min-height:52px; padding:14px 16px; background:var(--surface); border:1px solid var(--border); border-radius:14px; color:var(--fg); font:inherit; font-size:16px; }
    .input::placeholder { color:var(--muted); }
    .btn-primary { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; min-height:54px; margin-top:14px; padding:14px 20px; background:var(--accent); color:#06201d; border:0; border-radius:16px; font:inherit; font-size:17px; font-weight:800; letter-spacing:-0.01em; cursor:pointer; box-shadow:0 10px 28px -10px var(--accent); }
    .footnote { margin-top:auto; padding-top:28px; color:var(--muted); font-size:11px; line-height:1.5; max-width:260px; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="caption"><strong>PokerFace</strong> · Home</div>
    <div class="device">
      <span class="btn-rail left-1"></span><span class="btn-rail left-2"></span>
      <span class="btn-rail left-3"></span><span class="btn-rail right-1"></span>
      <span class="island"></span>
      <div class="screen">
        <div class="statusbar">
          <span class="num">9:41</span>
          <span class="right">
            <svg viewBox="0 0 17 11"><rect x="0" y="7" width="3" height="4" rx="0.6"/><rect x="4" y="5" width="3" height="6" rx="0.6"/><rect x="8" y="3" width="3" height="8" rx="0.6"/><rect x="12" y="0" width="3" height="11" rx="0.6"/></svg>
            <svg viewBox="0 0 17 11"><path d="M8.5 1.5C5.5 1.5 2.7 2.6 0.5 4.6L2 6.1C3.8 4.5 6.1 3.6 8.5 3.6c2.4 0 4.7 0.9 6.5 2.5l1.5-1.5c-2.2-2-5-3.1-8-3.1zM3.5 7.6L5 9.1c1-0.9 2.2-1.4 3.5-1.4 1.3 0 2.5 0.5 3.5 1.4l1.5-1.5c-1.4-1.3-3.1-2-5-2-1.9 0-3.6 0.7-5 2zM6.5 10.6l2 2 2-2c-0.5-0.5-1.2-0.8-2-0.8s-1.5 0.3-2 0.8z"/></svg>
            <svg class="battery" viewBox="0 0 25 11"><rect x="0.5" y="0.5" width="21" height="10" rx="2.5" fill="none" stroke="currentColor" stroke-opacity="0.45"/><rect x="22" y="3.5" width="1.5" height="4" rx="0.4" fill="currentColor" fill-opacity="0.45"/><rect x="2" y="2" width="18" height="7" rx="1.4"/></svg>
          </span>
        </div>

        <main class="content">
          <div class="welcome">
            <div class="logo">🎭</div>
            <h1 class="brand">PokerFace</h1>
            <p class="tagline">Не улыбайся. Останься последним.</p>

            <div class="field">
              <label for="name">Твоё имя</label>
              <input class="input" id="name" placeholder="Например, Васёк" value="" />
            </div>
            <button class="btn-primary">🎮&nbsp; Играть</button>

            <p class="footnote">Камера и распознавание улыбки работают на устройстве. Видео никуда не записывается.</p>
          </div>
        </main>

        <div class="home-indicator"></div>
      </div>
    </div>
  </div>
</body>
</html>
