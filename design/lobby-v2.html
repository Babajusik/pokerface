<!doctype html>
<!-- PokerFace Lobby v2 — лайм «ночное шоу». Бейдж ХОСТ, X из Y, готовность, камеры, НАЧАТЬ. -->
<html lang="ru">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PokerFace · Lobby v2</title>
  <style>
    :root{--bg:#08080a;--surface:#141418;--surface2:#1c1c22;--border:#2a2a33;--fg:#f4f4f6;--muted:#8a8a96;--accent:#c8f250;--green:#7ee08a;--font-display:'SF Pro Display',-apple-system,system-ui,sans-serif;--font-body:-apple-system,system-ui,sans-serif;--font-mono:ui-monospace,Menlo,monospace}
    *,*::before,*::after{box-sizing:border-box}html,body{margin:0;height:100%}
    body{background:radial-gradient(70% 40% at 50% -5%,rgba(200,242,80,.08),var(--bg) 60%);color:var(--fg);font-family:var(--font-body);display:grid;place-items:center;padding:32px}
    .caption{font-family:var(--font-mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:22px;text-align:center}
    .caption strong{color:var(--fg)}
    .device{position:relative;width:390px;height:844px;border-radius:56px;padding:12px;background:linear-gradient(160deg,#2a2a2c,#141416 55%,#0a0a0c);box-shadow:0 0 0 2px #000 inset,0 28px 60px -12px rgba(0,0,0,.55)}
    .island{position:absolute;top:22px;left:50%;transform:translateX(-50%);width:124px;height:36px;background:#000;border-radius:999px;z-index:5}
    .screen{position:relative;width:100%;height:100%;background:var(--bg);border-radius:44px;overflow:hidden;display:flex;flex-direction:column}
    .statusbar{flex:0 0 47px;padding:18px 26px 0;display:flex;justify-content:space-between;font-size:15px;font-weight:600}
    .num{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
    .content{flex:1 1 auto;overflow:hidden;display:flex;flex-direction:column;padding:6px 18px 18px}
    .home-indicator{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);width:134px;height:5px;background:var(--fg);border-radius:999px;opacity:.85}

    .top{display:flex;align-items:flex-start;justify-content:space-between;margin-top:4px}
    .topL{display:flex;align-items:center;gap:10px}
    .host{background:var(--accent);color:#10210a;font-weight:900;font-size:12px;letter-spacing:1px;border-radius:8px;padding:5px 10px}
    .lname{font-family:var(--font-display);font-size:20px;font-weight:800}
    .code{font-family:var(--font-mono);color:var(--accent);font-size:12px;letter-spacing:1px}
    .topR{text-align:right}
    .cnt{font-size:20px;font-weight:800} .cnt small{color:var(--muted);font-weight:600;font-size:14px}
    .leave{color:var(--muted);font-size:13px;margin-top:2px}

    .roster{margin-top:14px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:0 14px}
    .r{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-top:1px solid var(--border)}
    .r:first-child{border-top:0}
    .rn{font-size:16px;font-weight:700} .rs{font-size:14px;font-weight:700}
    .ok{color:var(--green)} .no{color:var(--muted)}

    .label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin:16px 2px 8px}
    .cams{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .cam{aspect-ratio:1/1;border-radius:14px;background:linear-gradient(135deg,#202028,#15151a);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:30px;position:relative}
    .cam b{position:absolute;left:8px;bottom:8px;font-size:11px;color:var(--fg);background:rgba(0,0,0,.5);padding:2px 8px;border-radius:8px;font-weight:600}

    .controls{margin-top:auto;display:flex;gap:10px;padding-top:14px}
    .ready{flex:1;min-height:54px;display:flex;align-items:center;justify-content:center;border-radius:14px;background:rgba(126,224,138,.15);border:1px solid var(--green);color:var(--green);font-weight:800;font-size:16px}
    .start{flex:1;min-height:54px;display:flex;align-items:center;justify-content:center;border-radius:14px;background:var(--accent);color:#10210a;font-weight:900;font-size:16px;letter-spacing:1px;box-shadow:0 10px 26px -8px rgba(200,242,80,.5)}
  </style>
</head>
<body>
  <div>
    <div class="caption"><strong>PokerFace</strong> · Lobby v2</div>
    <div class="device"><span class="island"></span><div class="screen">
      <div class="statusbar"><span class="num">9:41</span><span class="num">100%</span></div>
      <div class="content">
        <div class="top">
          <div class="topL"><span class="host">ХОСТ</span><div><div class="lname">Игра Васька</div><div class="code">код: K7QF2A</div></div></div>
          <div class="topR"><div class="cnt">3 <small>из 4</small></div><div class="leave">Выйти</div></div>
        </div>

        <div class="roster">
          <div class="r"><span class="rn">👑 Вася (ты)</span><span class="rs ok">готов ✓</span></div>
          <div class="r"><span class="rn">Марс</span><span class="rs no">не готов</span></div>
          <div class="r"><span class="rn">Коля</span><span class="rs ok">готов ✓</span></div>
        </div>

        <div class="label">Камеры</div>
        <div class="cams">
          <div class="cam">🙂<b>Вася</b></div>
          <div class="cam">😐<b>Марс</b></div>
          <div class="cam">😎<b>Коля</b></div>
          <div class="cam" style="opacity:.5">＋<b>ждём…</b></div>
        </div>

        <div class="controls">
          <div class="ready">✓ Готов</div>
          <div class="start">НАЧАТЬ</div>
        </div>
      </div>
      <div class="home-indicator"></div>
    </div></div>
  </div>
</body>
</html>
